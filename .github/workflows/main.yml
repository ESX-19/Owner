name: RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force

          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create User
        run: |
          net user RDP 123456Aa! /add
          net localgroup administrators RDP /add
          net localgroup "Remote Desktop Users" RDP /add

          echo "USER=RDP" >> $env:GITHUB_ENV
          echo "PASS=123456Aa!" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

          Start-Sleep 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "IP=$ip" >> $env:GITHUB_ENV

      - name: Show Info
        run: |
          Write-Host "========== RDP =========="
          Write-Host "IP: $env:IP"
          Write-Host "User: $env:USER"
          Write-Host "Pass: $env:PASS"
          Write-Host "========================="

      - name: Keep Alive
        run: |
          while ($true) {
            Start-Sleep 300
          }
